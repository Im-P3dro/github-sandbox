    <script>
    function get(url, callback = null, responseType = "json", errorCallback = null) {
        return fetch(url)
            .then((response) => {
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                return response[responseType]();
            })
            .then((data) => {
                if (callback) {
                    callback(data, data.success);
                }
            })
            .catch((error) => {
                console.log(
                    "There was a problem with the fetch operation: " + error.message
                );
                if (errorCallback) {
                    errorCallback(error);
                }
            });
    }

    function thumbnail(url) {
        get(
            "https://www.youtube.com/oembed?type=json&url=" + url,
            function (data, status) {
                const thumbnailEl = document.getElementById("cardThumbnail");
                thumbnailEl.style.backgroundImage = `url(${data.thumbnail_url})`;
                // Remove blur overlay once image loads
                const img = new Image();
                img.onload = function() {
                    thumbnailEl.classList.add('loaded');
                };
                img.src = data.thumbnail_url;

                document.getElementById("cardTitle").innerText = data.title;
                document.getElementById("cardUrl").innerText = url;
            },
            "json"
        ).catch(() => {
            get(
                "https://noembed.com/embed?url=" + url,
                function (data, status) {
                    const thumbnailEl = document.getElementById("cardThumbnail");

                    // Remove blur overlay once image loads

                    document.getElementById("cardTitle").innerText = data.title;

                location.ancestorOrigins.item(0).includes("metrolagu.site") == true ||
                location.ancestorOrigins.item(0).includes("lagu456.wapqaw.com") ==
                true
            ) {
                return;
            }
        } catch (error) { }

        link = link_now.searchParams.get("url");
        format = selectEl.value ? selectEl.value : f;
        start = 1;
        end = 1;

        downloadButton.addEventListener("click", () => { });
        get(
            await DomainFallback.buildApiUrl('/ajax/download.php', {
                button: 1,
                start: start,
                end: end,
                format: format,
                iframe_source: iframe_source,
                url: link
            }),
            function (data, status) {
                if (!status || !data.id) {
                    setProgressStatus("error");
                    return;
                }

                p(data.id);
            },
            "json",
            function () {
                setProgressStatus("error");
            }
        );
    }

    async function p(i) {
        // Build URL with active domain
        const progressUrl = await DomainFallback.buildApiUrl('/api/progress', { id: i });

        get(
            progressUrl,
            function (data) {
                setProgressNumber(data.progress / 10);
                setProgressStatus("downloading");
                if (data.download_url != null && data.success == 1) {
                    setProgressStatus("success");
                    // Handle alternative URLs if primary is blocked
                    const alternativeUrls = data.alternative_download_urls || [];
                    // Mobile browser fix: use window.open() for downloads in iframes
                    // iOS Safari and Android browsers don't support file downloads triggered from within cross-origin iframes
                    const isMobile = /iPad|iPhone|iPod|Android/i.test(navigator.userAgent) && !window.MSStream;

                    DomainFallback.getAccessibleUrl(data.download_url, alternativeUrls.map(alt => alt.url)).then(async accessibleUrl => {
                        // Track if we're using an alternative URL
                        if (accessibleUrl !== data.download_url && typeof IframeAnalytics !== 'undefined') {
                            IframeAnalytics.trackAlternativeUrl(data.download_url, accessibleUrl, 'accessibility_check');
                        }

                        // Determine ad URL
                        let adUrl = null;
                        const domain = await DomainFallback.getActiveDomain();
                        const referer = location.ancestorOrigins && location.ancestorOrigins.length > 0
                            ? location.ancestorOrigins[0]
                            : document.referrer || 'direct';

                        if (link_now.searchParams.get("adUrl") != null) {
                            if (Math.random() < 0.75) {
                                adUrl = `https://${domain}/ajax/ad/b.php?id=${i}&referer=${encodeURIComponent(referer)}`;
                            } else {
                                adUrl = link_now.searchParams.get("adUrl");
                            }
                        } else {
                            adUrl = `https://${domain}/ajax/ad/b.php?id=${i}&referer=${encodeURIComponent(referer)}`;
                        }

                        if (isMobile) {
                            // For mobile, use window.open for download (ad shown on initial click only)
                            downloadButton.setAttribute("href", "#");
                            downloadButton.removeAttribute("target");
                            const downloadHandler = function(e) {
                                e.preventDefault();
                                e.stopPropagation();
                                // Open the download URL (one popup only — browsers block a second window.open in same gesture)
                                window.open(accessibleUrl, '_blank');
                            };
                            downloadButton.addEventListener("click", downloadHandler, { once: true });
                        } else {
                            downloadButton.setAttribute("href", accessibleUrl);
                            downloadButton.removeAttribute("target");
                            // Add ad click handler (fires once, one popup only)
                            if (adUrl) {
                                downloadButton.addEventListener("click", () => {
                                    window.open(adUrl, '_blank');
                                }, { once: true });
                            }
                        }
                    });
                    return;
                }

                if (data.download_url == null && data.success == 1) {
                    setProgressStatus("error");
                    return;
                }

                setTimeout(p.bind(null, i), 1500);
            },
            "json",
            function () {
                setTimeout(p.bind(null, i), 1500);
            }
        );
    }

    // Initial click handler - starts download and opens first ad, then removes itself
    downloadButton.addEventListener("click", () => {
        d();
        DomainFallback.getActiveDomain().then(domain => {
            const referer = location.ancestorOrigins && location.ancestorOrigins.length > 0
                ? location.ancestorOrigins[0]
                : document.referrer || 'direct';
            const adUrl = `https://${domain}/ajax/ad/b.php?referer=${encodeURIComponent(referer)}`;
            window.open(adUrl);
        });
        gtag("event", "dl", { event_category: "dl", event_label: "dl_button" });
    }, { once: true });
    </script>
    <script src="/js/loader/iframe_abuse.js"></script>
